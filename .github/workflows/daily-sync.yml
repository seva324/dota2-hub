# Daily Data Sync Workflow
# Syncs tournament and upcoming data from external APIs
#
# 两种同步方式:
# 1. API 调用 (推荐): 调用部署的 Vercel API 端点
# 2. 脚本运行 (备选): 直接运行 Node.js 脚本

name: Daily Sync

on:
  schedule:
    # 每天 UTC 00:00 运行 (北京时间 08:00)
    # Vercel 免费计划最高支持每日一次定时任务
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手动触发

env:
  VERCEL_DEPLOYMENT_URL: ${{ vars.VERCEL_DEPLOYMENT_URL }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ============================================
      # 方式 1: 调用 API 端点 (需要已部署)
      # ============================================
      - name: Sync via API (Tournaments)
        if: env.VERCEL_DEPLOYMENT_URL != ''
        run: |
          echo "Calling sync-opendota API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ env.VERCEL_DEPLOYMENT_URL }}/api/sync-opendota" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            || echo "000")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

      - name: Sync via API (Upcoming)
        if: env.VERCEL_DEPLOYMENT_URL != ''
        run: |
          echo "Calling sync-liquipedia API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ env.VERCEL_DEPLOYMENT_URL }}/api/sync-liquipedia" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            || echo "000")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

      # ============================================
      # 方式 2: 直接运行脚本 (备选方案)
      # ============================================
      - name: Sync via Script (Tournaments)
        if: env.VERCEL_DEPLOYMENT_URL == ''
        run: |
          echo "Running sync script for tournaments..."
          node scripts/fetch-opendota-incremental.js || echo "Script completed"
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        continue-on-error: true

      - name: Sync via Script (Upcoming)
        if: env.VERCEL_DEPLOYMENT_URL == ''
        run: |
          echo "Running sync script for upcoming matches..."
          # 优先使用 fetch-upcoming-cn.js
          if [ -f "scripts/fetch-upcoming-cn.js" ]; then
            node scripts/fetch-upcoming-cn.js || echo "Script completed"
          # 备选: 尝试 scrape-liquipedia.js
          elif [ -f "scripts/scrape-liquipedia.js" ]; then
            node scripts/scrape-liquipedia.js || echo "Script completed"
          else
            echo "No upcoming sync script found"
          fi
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        continue-on-error: true

      # ============================================
      # 保存数据到静态文件 (供 GitHub Pages 使用)
      # ============================================
      - name: Export data to static files
        run: |
          echo "Exporting data to static files..."
          # 将 Redis 数据导出到 public/data/
          # 这里需要添加导出逻辑
          node scripts/export-static-data.js || echo "Export completed"
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        continue-on-error: true

      - name: Commit and push data changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if there are data changes
          if git diff --quiet public/data/ 2>/dev/null; then
            echo "No data changes to commit"
          else
            echo "Committing data changes..."
            git add public/data/
            git commit -m "data: Daily sync $(date -u +'%Y-%m-%d %H:%M')" || echo "No changes"
            git push origin main || echo "Push skipped"
          fi
