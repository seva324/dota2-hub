name: EdgeOne Scheduled API Jobs

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '30 9 * * *'
    - cron: '0 14 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: cron target path, for example /api/cron?action=sync-opendota
        required: false
        default: /api/cron?action=sync-opendota

jobs:
  run-scheduled-request:
    runs-on: ubuntu-latest
    env:
      EDGEONE_SITE_URL: ${{ secrets.EDGEONE_SITE_URL }}
    steps:
      - name: Validate base URL
        run: test -n "$EDGEONE_SITE_URL"

      - name: Resolve target path
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_PATH="${{ github.event.inputs.target }}"
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            TARGET_PATH="/api/cron?action=sync-opendota"
          elif [ "${{ github.event.schedule }}" = "30 9 * * *" ]; then
            TARGET_PATH="/api/sync-news"
          elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            TARGET_PATH="/api/sync-liquipedia"
          else
            TARGET_PATH="/api/cron?action=refresh-derived-data-incremental"
          fi
          echo "target_path=$TARGET_PATH" >> "$GITHUB_OUTPUT"

      - name: Invoke EdgeOne API
        run: |
          URL="${EDGEONE_SITE_URL%/}${{ steps.target.outputs.target_path }}"
          echo "Calling $URL"
          curl --fail --show-error --silent "$URL"
